<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Live Computer-Use Voice Client</title>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.7);
            --accent-color: #0ea5e9;
            --accent-glow: rgba(14, 165, 233, 0.4);
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --success-color: #10b981;
            --error-color: #ef4444;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(14, 165, 233, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.03) 0%, transparent 40%);
        }

        header {
            width: 100%;
            max-width: 1200px;
            padding: 2rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0ea5e9 0%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-muted);
            box-shadow: 0 0 8px var(--text-muted);
        }

        .status-dot.connected {
            background-color: var(--success-color);
            box-shadow: 0 0 10px var(--success-color);
        }

        .status-dot.error {
            background-color: var(--error-color);
            box-shadow: 0 0 10px var(--error-color);
        }

        .status-dot.processing {
            background-color: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
            animation: pulse 1.5s infinite;
        }

        main {
            width: 100%;
            max-width: 1200px;
            padding: 2rem 1rem;
            display: grid;
            grid-template-columns: 1.2fr 1.8fr;
            gap: 2rem;
            flex-grow: 1;
        }

        /* Glassmorphism Cards */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Controls Area */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        select, input, button {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        select option {
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        select:focus, input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        button {
            cursor: pointer;
            font-weight: 600;
            background: linear-gradient(135deg, #0284c7 0%, #0ea5e9 100%);
            border: none;
            color: white;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px var(--accent-glow);
        }

        button.active {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        /* Dynamic Visualizer Ring */
        .visualizer-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 1rem auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            box-shadow: 0 0 20px var(--accent-glow);
            transition: all 0.5s ease;
        }

        .pulse-ring.listening {
            animation: pulse-active 1.5s infinite;
        }

        .pulse-ring.speaking {
            border-color: var(--success-color);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
            animation: pulse-active-success 1.2s infinite;
        }

        .mic-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            z-index: 2;
        }

        /* Screen Preview */
        .preview-container {
            width: 100%;
            aspect-ratio: 16/10;
            border-radius: 12px;
            background: #000;
            overflow: hidden;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        video, canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .preview-placeholder {
            position: absolute;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            align-items: center;
        }

        /* Logs feed */
        .logs-container {
            display: flex;
            flex-direction: column;
            height: 500px;
        }

        .logs-feed {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            font-size: 0.95rem;
            scroll-behavior: smooth;
        }

        .log-entry {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            animation: fadeIn 0.3s ease;
        }

        .log-role {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .log-role.user { color: #38bdf8; }
        .log-role.assistant { color: #34d399; }
        .log-role.system { color: #a3a3a3; }

        .log-text {
            line-height: 1.5;
            white-space: pre-wrap;
            background: rgba(255, 255, 255, 0.02);
            padding: 0.6rem 0.8rem;
            border-radius: 8px;
            border-left: 2px solid currentColor;
        }

        /* Keyframes */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse-active {
            0% { transform: scale(0.9); opacity: 0.8; box-shadow: 0 0 10px var(--accent-glow); }
            50% { transform: scale(1.1); opacity: 0.4; box-shadow: 0 0 30px var(--accent-glow); }
            100% { transform: scale(0.9); opacity: 0.8; box-shadow: 0 0 10px var(--accent-glow); }
        }

        @keyframes pulse-active-success {
            0% { transform: scale(0.9); opacity: 0.8; box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
            50% { transform: scale(1.15); opacity: 0.3; box-shadow: 0 0 30px rgba(16, 185, 129, 0.4); }
            100% { transform: scale(0.9); opacity: 0.8; box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
        /* Dropdown menu needs explicit dark background so Windows doesn't render it white */
        select {
            background-color: var(--bg-color);
        }
        select option, select optgroup {
            background-color: var(--bg-color);
            color: var(--text-color);
        }
    </style>
</head>
<body>

            <span id="status-indicator" class="status-dot"></span>

            </div>

            <button id="connect-btn">Connect Server</button>

            <div class="visualizer-container">

        <!-- Dynamic Logs and Chat -->
        <section class="card logs-container">
            <h2>Live Session Feed</h2>
            <div class="logs-feed" id="logs-feed">
                <div class="log-entry">
                    <span class="log-role system">System</span>
                    <span class="log-text">Welcome! Set the Server Address and click Connect to start the loop.</span>
                </div>
            </div>
            
            <div class="control-group" style="flex-direction: row; gap: 0.5rem;">
                <input type="text" id="text-input" placeholder="Type a message fallback..." disabled>
                <button id="send-btn" style="width: auto; padding: 0.8rem 1.5rem;" disabled>Send</button>
            </div>

    <script>
        const serverAddress = document.getElementById("server-address");
        const ttsVoice = document.getElementById("tts-voice");
        const connectBtn = document.getElementById("connect-btn");
        const screenBtn = document.getElementById("screen-btn");
        const previewVideo = document.getElementById("preview-video");
        const captureCanvas = document.getElementById("capture-canvas");
        const previewPlaceholder = document.getElementById("preview-placeholder");
        const logsFeed = document.getElementById("logs-feed");
        const textInput = document.getElementById("text-input");
        const sendBtn = document.getElementById("send-btn");
        const statusIndicator = document.getElementById("status-indicator");
        const statusText = document.getElementById("status-text");
        const visualizerRing = document.getElementById("visualizer-ring");

        let ws = null;
        let screenStream = null;
        let audioContext = null;
        let micStream = null;
        let micProcessor = null;
        let screenInterval = null;
        let audioQueue = [];
        let isPlayingAudio = false;
        let isProcessing = false;
        let echoTimeout = null;

        // --- Logger Helper ---
        function addLog(role, text) {
            const entry = document.createElement("div");
            entry.className = "log-entry";
            
            const roleSpan = document.createElement("span");
            roleSpan.className = `log-role ${role}`;
            roleSpan.textContent = role;
            
            const textSpan = document.createElement("span");
            textSpan.className = "log-text";
            textSpan.textContent = text;
            
            entry.appendChild(roleSpan);
            entry.appendChild(textSpan);
            logsFeed.appendChild(entry);
            logsFeed.scrollTop = logsFeed.scrollHeight;
        }

        // --- Server Connection ---
        connectBtn.addEventListener("click", () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                closeConnection();
            } else {
                openConnection();
            }
        });

        function openConnection() {
            addLog("system", `Connecting to server at ${serverAddress.value}...`);
            statusIndicator.className = "status-dot processing";
            statusText.textContent = "Connecting";
            
            ws = new WebSocket(serverAddress.value);
            
            ws.onopen = () => {
                addLog("system", "Connected to Voice Server.");
                statusIndicator.className = "status-dot connected";
                statusText.textContent = "Connected";
                connectBtn.textContent = "Disconnect";
                screenBtn.disabled = false;
                textInput.disabled = false;
                sendBtn.disabled = false;
                
                // Initialize audio contexts
                initAudio();
            };
            
            ws.onclose = () => {
                addLog("system", "Disconnected from server.");
                closeConnection();
            };
            
            ws.onerror = (err) => {
                addLog("system", `WebSocket Error: Connection failed.`);
                statusIndicator.className = "status-dot error";
                statusText.textContent = "Error";
            };

            ws.onmessage = async (event) => {
                if (event.data instanceof Blob) {
                    // Speech audio response (WAV)
                    const arrayBuffer = await event.data.arrayBuffer();
                    playAudioBuffer(arrayBuffer);
                } else {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === "transcript") {
                            addLog("user", data.text);
                            visualizerRing.className = "pulse-ring listening";
                            isProcessing = true; // Wait for VLM
                        } else if (data.type === "thought") {
                            addLog("assistant", data.text);
                        } else if (data.type === "text_response") {
                            addLog("assistant", data.text);
                        } else if (data.type === "action") {
                            addLog("system", data.text);
                        } else if (data.type === "status") {
                            statusText.textContent = data.text;
                            if (data.text === "Thinking...") {
                                isProcessing = true;
                            } else if (data.text === "Connected") {
                                isProcessing = false;
                            }
                        }
                    } catch (e) {
                        logger.error(e);
                    }
                }
            };
        }

        function getScaledSize(width, height) {
            const ratio = height > 0 ? width / height : 1.0;
            const targets = [
                { width: 1024, height: 768 },
                { width: 1280, height: 800 },
                { width: 1366, height: 768 }
            ];
            for (let dim of targets) {
                if (Math.abs((dim.width / dim.height) - ratio) < 0.02 && dim.width < width) {
                    return [dim.width, dim.height];
                }
            }
            const max_w = 1366;
            const max_h = 768;
            const scale = Math.min(max_w / width, max_h / height, 1.0);
            return [Math.max(1, Math.round(width * scale)), Math.max(1, Math.round(height * scale))];
        }

        function closeConnection() {
            if (ws) {
                ws.close();
                ws = null;
            }
            stopScreenSharing();
            stopAudioInput();
            statusIndicator.className = "status-dot";
            statusText.textContent = "Disconnected";
            connectBtn.textContent = "Connect Server";
            screenBtn.disabled = true;
            textInput.disabled = true;
            sendBtn.disabled = true;
            visualizerRing.className = "pulse-ring";
        }

        // --- Screen Sharing Loop ---
        screenBtn.addEventListener("click", async () => {
            if (screenStream) {
                stopScreenSharing();
            } else {
                await startScreenSharing();
            }
        });

        async function startScreenSharing() {
            try {
                screenStream = await navigator.mediaDevices.getDisplayMedia({
                    video: { frameRate: { ideal: 5 } },
                    audio: false
                });
                
                previewVideo.srcObject = screenStream;
                previewPlaceholder.style.display = "none";
                screenBtn.textContent = "Stop Share";
                screenBtn.className = "active";
                
                // Set up visual capture loop (1 FPS)
                const ctx = captureCanvas.getContext("2d");
                


                screenInterval = setInterval(() => {
                    if (ws && ws.readyState === WebSocket.OPEN && previewVideo.readyState === previewVideo.HAVE_ENOUGH_DATA) {
                        let vw = previewVideo.videoWidth;
                        let vh = previewVideo.videoHeight;
                        if (vw > 0 && vh > 0) {
                            let [out_w, out_h] = getScaledSize(vw, vh);
                            captureCanvas.width = out_w;
                            captureCanvas.height = out_h;
                            ctx.drawImage(previewVideo, 0, 0, captureCanvas.width, captureCanvas.height);
                            
                            // Export as JPEG bytes
                            captureCanvas.toBlob((blob) => {
                                if (blob && ws.readyState === WebSocket.OPEN) {
                                    ws.send(blob);
                                }
                            }, "image/jpeg", 0.6);
                        }
                    }
                }, 333);
                
                addLog("system", "Screen share active and streaming.");
            } catch (e) {
                addLog("system", `Screen Share Failed: ${e.message}`);
            }
        }

        function stopScreenSharing() {
            if (screenInterval) {
                clearInterval(screenInterval);
                screenInterval = null;
            }
            if (screenStream) {
                screenStream.getTracks().forEach(track => track.stop());
                screenStream = null;
            }
            previewVideo.srcObject = null;
            previewPlaceholder.style.display = "flex";
            screenBtn.textContent = "Share Screen";
            screenBtn.className = "";
        }

        // --- Audio Capture & Stream ---
        async function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                micStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { 
                        echoCancellation: true, 
                        noiseSuppression: true, 
                        autoGainControl: true 
                    }, 
                    video: false 
                });
                
                const source = audioContext.createMediaStreamSource(micStream);
                // ScriptProcessor is deprecated but offers high-portability for simple PCM conversions
                micProcessor = audioContext.createScriptProcessor(4096, 1, 1);
                
                source.connect(micProcessor);
                micProcessor.connect(audioContext.destination);
                
                micProcessor.onaudioprocess = (e) => {
                    if (ws && ws.readyState === WebSocket.OPEN && !isPlayingAudio && !isProcessing) {
                        const inputData = e.inputBuffer.getChannelData(0);
                        // Convert Float32 array to 16-bit signed Int16 array
                        const pcmData = new Int16Array(inputData.length);
                        for (let i = 0; i < inputData.length; i++) {
                            pcmData[i] = Math.min(1, Math.max(-1, inputData[i])) * 0x7FFF;
                        }
                        // Send binary packet
                        ws.send(pcmData.buffer);
                    }
                };
                
                visualizerRing.className = "pulse-ring listening";
                addLog("system", "Microphone capture active.");
            } catch (e) {
                addLog("system", `Microphone Access Failed: ${e.message}`);
            }
        }

        function stopAudioInput() {
            if (micProcessor) {
                micProcessor.disconnect();
                micProcessor = null;
            }
            if (micStream) {
                micStream.getTracks().forEach(track => track.stop());
                micStream = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
        }

        // --- Playback audio ---
        async function playAudioBuffer(arrayBuffer) {
            try {
                // Use standard HTML Audio for robust playback of WAV and compressed formats
                const blob = new Blob([arrayBuffer], { type: 'audio/wav' });
                const url = URL.createObjectURL(blob);
                const audio = new Audio(url);
                
                isPlayingAudio = true;
                visualizerRing.className = "pulse-ring speaking";
                statusText.textContent = "Speaking";
                
                audio.onended = () => {
                    setTimeout(() => {
                        isPlayingAudio = false;
                        // DO NOT reset isProcessing here, the server controls when it's done via "Connected" status
                        URL.revokeObjectURL(url);
                        
                        // Only visually revert to listening if server is no longer processing
                        if (!isProcessing) {
                            visualizerRing.className = "pulse-ring listening";
                            statusText.textContent = "Connected";
                        } else {
                            visualizerRing.className = "pulse-ring processing";
                            statusText.textContent = "Processing...";
                        }
                    }, 600);
                };
                
                audio.onerror = (e) => {
                    console.error("Audio playback error:", e);
                    isPlayingAudio = false;
                };
                
                await audio.play();
            } catch (e) {
                console.error("Error setting up audio playback:", e);
                isPlayingAudio = false;
            }
        }

        // --- Text input support ---
        sendBtn.addEventListener("click", sendTextMessage);
        textInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendTextMessage();
        });

        function sendTextMessage() {
            const text = textInput.value.trim();
            if (text && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: "text_prompt",
                    text: text
                }));
                addLog("user", text);
                textInput.value = "";
            }
        }
    </script>
</body>
</html>
